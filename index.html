<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menthol World — 薄城</title>
  <link rel="icon" type="image/png" href="https://images.moecm.com/images/2026/06/25/Gemini_Generated_Image_q1t5tbq1t5tbq1t5.png">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-deep:#040a10;--bg-card:#09131a;--bg-surface:#0d1720;
      --text-primary:#dde4ea;--text-secondary:#8b99a5;--text-muted:#556270;
      --accent:#f0a34b;--accent-dim:#b87a2e;
      --border:#182530;--radius:8px;
      --font-display:'Georgia','Noto Serif SC',serif;
      --font-body:'Inter','PingFang SC','Microsoft YaHei',sans-serif;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);background:var(--bg-deep);color:var(--text-primary);line-height:1.7;-webkit-font-smoothing:antialiased}

    .hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;background:radial-gradient(ellipse at 50% 100%,#0d1822 0%,#060c14 50%,#040a10 100%)}
    .skyline{position:absolute;bottom:0;left:0;width:100%;height:50%;pointer-events:none;z-index:1}
    .skyline svg{width:100%;height:100%}
    .fog{position:absolute;bottom:0;left:0;width:100%;height:35%;background:linear-gradient(to top,rgba(4,10,16,0.98) 0%,rgba(4,10,16,0.6) 40%,transparent 100%);pointer-events:none;z-index:2}
    .particles{position:absolute;inset:0;pointer-events:none;z-index:0}
    .particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;animation:floatUp 6s infinite ease-in;opacity:0}
    @keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:.6}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}
    .hero-content{position:relative;z-index:3;padding:2rem}
    .hero-brand{font-family:var(--font-display);font-size:clamp(2.5rem,7vw,6rem);font-weight:700;letter-spacing:.05em;background:linear-gradient(180deg,#fff 20%,#c4b5a5 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
    .hero-sub{font-family:var(--font-display);font-size:clamp(1rem,3vw,1.6rem);color:var(--text-secondary);font-style:italic;margin-bottom:2rem;letter-spacing:.08em}
    .hero-line{width:80px;height:2px;background:var(--accent);margin:0 auto 2rem;border-radius:1px}
    .hero-desc{max-width:560px;margin:0 auto;color:var(--text-muted);font-size:.95rem;line-height:2}

    /* 地图区域 */
    .map-section{position:relative;z-index:3;padding:4rem 2rem;text-align:center;background:linear-gradient(to bottom,var(--bg-deep) 0%,#060c14 100%)}
    .map-container{position:relative;display:inline-block;max-width:900px;width:100%;border-radius:var(--radius);overflow:visible;box-shadow:0 8px 40px rgba(0,0,0,0.5);border:1px solid var(--border)}
    .map-container img{display:block;width:100%;height:auto;border-radius:var(--radius)}
    .map-hotspot{position:absolute;cursor:pointer;transition:transform .2s ease;text-decoration:none}
    .map-hotspot .pulse{display:block;width:10px;height:10px;background:var(--accent);border-radius:50%;opacity:.7;animation:hotspotPulse 2s infinite ease-in-out;transition:opacity .2s ease,transform .2s ease}
    .map-hotspot:hover .pulse{opacity:1;transform:scale(1.3)}
    @keyframes hotspotPulse{0%,100%{box-shadow:0 0 0 0 rgba(240,163,75,0.6)}50%{box-shadow:0 0 0 12px rgba(240,163,75,0)}}
    .map-tooltip{position:absolute;bottom:calc(100% + 14px);left:50%;transform:translateX(-50%);background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;white-space:nowrap;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .25s ease,visibility .25s ease;z-index:10;box-shadow:0 6px 24px rgba(0,0,0,0.6)}
    .map-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:var(--bg-surface)}
    .map-hotspot:hover .map-tooltip{opacity:1;visibility:visible}
    .map-tooltip .tooltip-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);display:block;margin:0 auto 6px}
    .map-tooltip .tooltip-name{font-family:var(--font-body);font-size:.85rem;color:var(--accent);font-weight:600;text-align:center}
    .map-tooltip .tooltip-sub{font-size:.7rem;color:var(--text-muted);text-align:center;margin-top:2px}
    /* 地图标签 */
    .map-label{text-align:center;color:var(--text-muted);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;margin-top:.75rem}

    .intro{position:relative;z-index:3;padding:6rem 2rem;max-width:720px;margin:0 auto;text-align:center;background:linear-gradient(to bottom,var(--bg-deep) 0%,#060c14 40%)}
    .intro-label{font-family:var(--font-display);font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-dim);margin-bottom:2rem}
    .intro-quote{font-family:var(--font-display);font-size:clamp(1.3rem,3.5vw,1.8rem);color:var(--text-primary);line-height:1.8;margin-bottom:2.5rem}
    .intro-quote::before{content:'「';color:var(--accent-dim)}.intro-quote::after{content:'」';color:var(--accent-dim)}
    .intro-body{color:var(--text-secondary);font-size:.95rem;max-width:560px;margin:0 auto;line-height:2}
    .footer{position:relative;z-index:3;border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text-muted);font-size:.8rem;background:linear-gradient(to bottom,var(--bg-deep) 0%,#02060a 100%)}
    .footer .accent{color:var(--accent-dim)}
  </style>
</head>
<body>

<!-- Hero -->

  <div class="skyline"><svg viewBox="0 0 1440 500" preserveAspectRatio="xMidYMax slice" fill="none"><rect x="60" y="280" width="80" height="220" fill="#0a1016" rx="2"/><rect x="160" y="220" width="100" height="280" fill="#0b1118" rx="2"/><rect x="280" y="260" width="70" height="240" fill="#080e14" rx="2"/><rect x="370" y="190" width="90" height="310" fill="#0c131a" rx="2"/><rect x="480" y="300" width="60" height="200" fill="#090f15" rx="2"/><rect x="560" y="170" width="110" height="330" fill="#0b1218" rx="2"/><rect x="690" y="250" width="85" height="250" fill="#0a1017" rx="2"/><rect x="800" y="210" width="95" height="290" fill="#0b1118" rx="2"/><rect x="920" y="270" width="75" height="230" fill="#080e14" rx="2"/><rect x="1020" y="200" width="105" height="300" fill="#0c131a" rx="2"/><rect x="1140" y="240" width="90" height="260" fill="#0a1017" rx="2"/><rect x="1250" y="180" width="80" height="320" fill="#0b1218" rx="2"/><rect x="1350" y="290" width="90" height="210" fill="#080e14" rx="2"/><g fill="#3ccfcf" opacity="0.3"><rect x="180" y="240" width="5" height="7" rx="1"/><rect x="195" y="260" width="5" height="7" rx="1"/><rect x="220" y="250" width="5" height="7" rx="1"/><rect x="390" y="220" width="5" height="7" rx="1"/><rect x="410" y="250" width="5" height="7" rx="1"/><rect x="430" y="210" width="5" height="7" rx="1"/><rect x="590" y="200" width="5" height="7" rx="1"/><rect x="615" y="240" width="5" height="7" rx="1"/><rect x="630" y="190" width="5" height="7" rx="1"/><rect x="820" y="240" width="5" height="7" rx="1"/><rect x="850" y="230" width="5" height="7" rx="1"/><rect x="1050" y="220" width="5" height="7" rx="1"/><rect x="1070" y="260" width="5" height="7" rx="1"/><rect x="1270" y="200" width="5" height="7" rx="1"/><rect x="1290" y="230" width="5" height="7" rx="1"/></g><g fill="#f0a34b" opacity="0.35"><rect x="300" y="280" width="5" height="7" rx="1"/><rect x="315" y="290" width="5" height="7" rx="1"/><rect x="720" y="270" width="5" height="7" rx="1"/><rect x="740" y="285" width="5" height="7" rx="1"/><rect x="1160" y="260" width="5" height="7" rx="1"/><rect x="1180" y="275" width="5" height="7" rx="1"/><rect x="420" y="280" width="5" height="7" rx="1"/><rect x="880" y="260" width="5" height="7" rx="1"/><rect x="900" y="280" width="5" height="7" rx="1"/><rect x="1090" y="270" width="5" height="7" rx="1"/></g></svg></div>
  <div class="fog"></div>
  <div class="particles" aria-hidden="true"><div class="particle" style="left:10%;animation-delay:0s;animation-duration:7s"></div><div class="particle" style="left:25%;animation-delay:2s;animation-duration:9s"></div><div class="particle" style="left:40%;animation-delay:4s;animation-duration:6s"></div><div class="particle" style="left:55%;animation-delay:1s;animation-duration:8s"></div><div class="particle" style="left:70%;animation-delay:3s;animation-duration:10s"></div><div class="particle" style="left:85%;animation-delay:5s;animation-duration:7.5s"></div><div class="particle" style="left:15%;animation-delay:6s;animation-duration:8.5s"></div><div class="particle" style="left:92%;animation-delay:.5s;animation-duration:6.5s"></div></div>
  <div class="hero-content">
    <h1 class="hero-brand">Menthol World</h1>
    <p class="hero-sub">—— 薄城 ——</p>
    <div class="hero-line"></div>
    <p class="hero-desc">一座永不休眠的都市。全息投影下，千万条人生轨迹在此交织、碰撞、分岔。<br>五大城区，五种生活，每一扇窗后都藏着一个未被讲述的故事。</p>
  </div>
</section>

  <p class="intro-quote">在这座城市，每个角落都有属于自己的故事。</p>
  <p class="intro-body">薄城由五大城区构成——山顶别墅区俯瞰万物，商业区彻夜不眠，工业区齿轮永不停歇，海滨度假区拥抱海风与自由，而普通居民区里，子沐晨正写下属于他的篇章。</p>
</section>
