<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    color: #aaa;

    padding: 0 14px;

    align-items: center;

    border-radius: 6px;
    padding: 0 14px;
    font-size: 13px;
    border: 1px solid var(--accent, #f0a34b);
    background: transparent;
    color: var(--accent, #f0a34b);

  .toolbar .chapter-select {
    height: 32px;
    border-radius: 6px;
    padding: 0 10px;
    font-size: 13px;

    color: #ccc;

    width: 1px; height: 20px;

    margin: 0 2px;

  .toolbar label { font-size: 14px; color: #aaa; }

  .toolbar .page-indicator { font-size: 14px; color: #999; min-width: 110px; text-align: center; }

  .book-viewport {

    flex-direction: column;

  .page {

    background: #1c1c21;

  .page-content {
    font-size: 16px;
    line-height: 1.9;
    color: #c8c8cc;
    text-align: justify;
    word-break: break-all;
    height: 100%;

  .page-content .chapter-title {
    text-align: center;
    font-size: 1.6em;
    font-weight: bold;
    margin: 1em 0 0.9em;
    text-indent: 0;
    letter-spacing: 0.4em;
    color: #ddd;
  }
  .page-content .separator {
    text-align: center;
    text-indent: 0;
    margin: 0.5em 0;
    letter-spacing: 0.5em;
    color: #777;
  }
  .page-content .chapter-end {
    text-align: center;
    text-indent: 0;
    margin-top: 1em;
    font-weight: bold;
    letter-spacing: 0.2em;
    color: #aaa;
  }
  .page-number {
    position: absolute;
    bottom: 36px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
  }

  /* ── 小屏适配 ── */
  @media screen and (max-width: 840px) {
    .page {
      width: calc(100vw - 16px);
      height: calc((100vw - 16px) * 1.4142);
      padding: 10mm 12mm;

    .page-number { bottom: 6mm; }
    .toolbar { gap: 6px; padding: 8px 10px; }
    .toolbar button { min-width: 28px; height: 28px; font-size: 15px; }
    .toolbar .back-btn { position: static; font-size: 12px; padding: 0 10px; height: 28px; }
    .toolbar .restart-btn { font-size: 11px; padding: 0 8px; height: 28px; }
    .toolbar .next-chapter-btn { font-size: 11px; padding: 0 8px; height: 28px; }
    .toolbar .chapter-select { font-size: 11px; height: 28px; padding: 0 6px; }
    .toolbar .divider { display: none; }
  }

  @media print {
    body { background: #fff; padding: 0; }
    .toolbar { display: none; }
    .next-chapter-btn { display: none !important; }
    .book-viewport { margin-top: 0; gap: 0; }
    .page {
      background: #fff;
      box-shadow: none;
      page-break-after: always;
    }
    .page-content { color: #111; }
    .page-content .chapter-title { color: #111; }
    .page-content .separator { color: #555; }
    .page-content .chapter-end { color: #333; }
    .page-number { color: #999; }
    .page:last-child { page-break-after: avoid; }
  }
</style>

    "我想，人类的恶是与生俱来的。迫害他人时，总是毫不留情，心狠手辣。当面对自己的错误时，则又一笑而过。总是以旁观他人，无所作为的我，不断狠毒地点评着世界上的所有人，想必也是恶的一份子。",

    "“早知道就在学校抄一下同桌的了...”我轻声抱怨，手中的笔却不敢停下，因为我听到那个人又站在身后不远处，监视着我的一举一动。",
    "我就似玻璃罐中的蛐蛐，无论怎样挣扎，终究也无法逃出。",
    "好痛。",
    "......",
    "在校期间是我为数不多能够放松的时段，这里没有那么恐怖的氛围，也没有时时刻刻都在的监视者，唯一需要糊弄过去的只是老师而已。",

    "你可能会认为这又是一个青春男主的成功模板，对此我保持否定态度，我不会像他们那样善良，或者无意间显露出某种优良品质，我只会让自己成为最无聊的学生。为了让同学们对我毫无兴趣，成为那种可有可无的存在。",
    "在与同学们的日常交流中，我收集到了不少情报，契机也许就在其中。",
    "作为一名已经初中三年级的学生，中考即将来临。自认为只要选择一个远一点的学校，就能够暂时远离那个恐怖的牢笼。然而选择权并不在我的手上，如果只是普通的高中，那个人绝对又会大打出手，因此唯有考进重点高中，才能躲过此劫。",
    "提升自己的同时，还能暂时逃走，需要担心的只是自己的成绩了。",

    "真是无聊，这些人要么是真闲的没事干，要么是在害怕自己的秘密遭到败露，想从我的嘴里套出什么有用的线索。但是很抱歉，我真心没有揭秘你们的打算。于是我冲着他们笑了笑，埋头继续写手中的数学卷，强行无视掉他们追问的神情，一直到放学时间。",

    "......",

    "“这我还真的不太知道，我周围的人也没有抽烟的迹象。”我装作思考的样子，心中早已明晰她口中的那几位究竟是谁。说实话，我更想了解关于那位男老师的事项，不过我既然没有权利僭越询问，也只好怀揣着疑问等待答案揭晓了。",
    "“问你什么你都不知道，想从你嘴里套出点什么真的很难。”中年女人叹了口气，摆了摆手，示意我离开。我赔着笑脸点了点头，离开了教师办公室。到最后，我也没能弄明白那位男教师衬衫上的淡淡红色究竟是由何而来。如果...那个水渍正是误导选项，也就意味着我注意的关键选错了么...",
    "回到家后，只有那个女人自己侧卧在沙发上，正无聊地刷着视频，看到我回来，也只是瞥了一眼，就将视线放回手机屏幕上。男人多半又打牌去了，家中已经几乎没有他身上刺鼻的烟味，我不太想见到他，所以这也算一件好事。晚饭当然是没有的，幸好我有中午从食堂留下来的两个包子，就这样凑合一下吧。",
    "今天从同学口中了解到，只有一所重点高中实行着封闭式管理，学生在校期间无法联系到外界，因此这里正适合作为我升学的目标，我也相信这里一定能够帮助我逃离牢笼。同时，需要达到的分数正是我能够伸手碰到的距离，虽然不是炫耀，但是我的成绩并没有不堪入目，在班上也算是中等偏上人士。毕竟如果没有得到让他满意的成绩，他就会以此为借口，痛打我一顿。",
    "......",
    "既然目标已经明确，接下来只需要想办法在正式考试中拿到想要的分数就好了。",
    "于是在第二天的放学后，我来到了教师办公室。这里和往常一样，只有班主任留在桌前批改作业，其他老师很早就提前下班了。至于为什么她总是留到很晚，我只有一些无聊的猜测。",
    "同学们总说班主任的孩子也在这所学校读书，但是从来没见过他们母子俩一起离开过学校，也许是有特殊的家规，也有可能只是母子不合。而我则是认为班主任只是不想让她孩子的身份暴露，从而获得一位能够混在学生当中的“间谍”。这样看来，班主任几天前收到「有同学在抽烟」的消息来源就明晰了。",
    "依照这个线索推断...她的孩子应该与我们同岁不同班，否则怎么会不能知道那些抽烟的同学的名字？估计是在卫生间遇到了那些人，不过他从低年级跑到高年级来特意监视的可能性也并非没有。这些无关紧要的小事就想到这里吧，这次来主要是问班主任一些升学上的问题的。",
    "“真是稀客啊，子沐辰，你终于是犯什么事了？你总不会是来问我题的吧？”她抬头警惕地看着我，嘴角似笑非笑的有些上扬，手中的红笔一次次点在正批改的卷子上，她是感到有些焦躁么...因为我的到来？难道是她认为终于能掌握我的把柄，而感到有些激动吗？",
    "我迅速地用余光瞥了一眼她的身后，并没有上次那位男老师存在的痕迹。",
    "“啊...我就是想来跟您讨论一下关于升学的事。您也知道我们家的状况，跟他们讨论应该是行不通的，所以就想来找您问问。”我用有些为难的语气，加上不断躲闪的目光，恭敬地面对她。虽然很抱歉，但她应该是得不到我的把柄了。",
    "果然，她放下了手中的笔，收起了嘴角的笑容，甚至整个人的状态都暗淡了几分。",
    "“既然你都来问我了，你心里肯定是有什么打算了，那就跟我说说吧。”她的语气中充满着无奈。",
    "社会的进度因为各种原因而加快，学生的压力也正不断提高，简单来说，就是越来越“卷”了。虽然无数家长都在说要让孩子健康快乐就好，但是通过互相的比拼与沟通，总会认为自己的孩子仍然需要更进一步的提升，否则就会被其他人落在身后。这其中，感受最深的当属“班主任”这个职位了，他们可谓是从以前到现在一直追赶着不断变化的教学内容，因此他们也许会对未来的变化有些敏锐的感知。而我就是要抓住这一点，抓住这些看似虚无缥缈的机会。",
    "跟班主任聊了一下我的目标与计划后，空气陷入了片刻沉默。",
    "“子沐辰，你认为，你能申请到那所学校吗？”她的表情有些纠结，甚至皱起了眉头。",
    "“这么说有些自大，不过按照我现在的分数，应该是没有很大的问题吧？”我笑了笑，想让她把话说完。",
    "“你的家长，他们会让你去吗？他们极度想掌握你的人生，所以并不会心甘情愿放你离开吧。”她微微摇头，似乎已经看到这件事的结果。“就算你能偷偷把第一志愿换成别的学校，他们也会通过各种方式阻止你去吧。你最后也只能去那一所他们想让你去的学校。”班主任继续说着，用手中的红笔在草稿纸上画着圆圈，也许这样有助于她表达自己的想法。",
    "“对于如何报志愿，我有一些自己的想法。您说的很对，我的家庭基本上确定会阻止我的个人意志，是我没有考虑周到，谢谢老师。”我满怀感激地鞠躬，表现出恍然大悟的样子。我缓缓离开了办公室，没去管班主任有些疑惑的表情。",
    "我当然了解我的家庭，她所说的那些也只不过是没有营养的套话。我也只是要做好面子工程，再之后的事情，我就希望她不要纠正我的想法，静静等待事情的发展。",
    "......",
    "全市统一考试的分数发下来的那天，和我预想的差不多，依然处于班级排名的中游地带。不过这一次，我把答案额外记在了一张草稿纸上，将其夹进课本，以便之后使用。我小心翼翼，生怕有其他同学问我在做什么。",
    "几天后，市里把标准答案公布了出来，我把那张草稿纸从课本里抽出来，摊在桌上。那两道我私自改错的题，我用没改之前的正确步骤，重新誊了一遍。我一项一项地核对过去，笔尖落在纸上很轻，以防引来他人的关注。分数算出来的那一刻，我盯着那个数字，没有动。我又重新算了一遍乘法那一步，生怕自己漏看了哪个小数点。那所全封闭高中往年的录取线，我背得比任何课文都熟，而眼前这个数字，比那条线高出一大截。",
    "我装作一身轻松，强忍笑意，将这张已经被我汗水浸湿的草稿纸丢进了垃圾桶。这大概是我这十五年里，第一次为自己做了一件真正令人欣喜的事。",
    "......",
    "但是正向的气氛总是容易被怨气扑灭，也是那个月，家里的电费单成了一件值得吵架的事。",
    "晚饭过后，男人坐在沙发上翻手机。他忽然把手机拍在茶几上，声音很响。“这个月电费怎么多了快一半？”他盯着我，声音不高，带着一种审讯的腔调，“家里就你天天在屋里待着，是不是又偷偷玩手机了？”",
    "“没有。”这两个字说出来的时候，我心里在过一道题：电费的事，和那个真正的原因之间，到底隔着多远的距离，他会不会顺着这条线往下扯。我很快得出答案——大概不会，他向来懒得思考超过一层的因果。",
    "“没有电费能多出这么多？”他从沙发上站起来，朝我房间走去，“我数着钱过日子，你倒是会享受。”他看了我一眼，意思是让我跟着他。",
    "我把这间屋子在脑子里检查了一遍，资料藏得够不够深，草稿纸在不在视线之内。说出真正的原因只会引来更多的问题——为什么突然这么用功，打算考哪所，打算又是什么。比起任何解释，“没有”是最省事的答案，省事到我觉得，这是我为数不多擅长的事。",
    "他在我书桌前站定。他的目光扫过那几本摊开的复习资料，又拉开抽屉。他没找到手机，脸色却没有因此缓和，反而更难看了，像是没找到证据这件事本身，就足够构成证据。也是...他只是因为电费而心情不好，想找一个发泄的出口罢了。",
    "“我跟你说话，你哑巴了？！”他的语调变得高昂，情绪也不再平稳，变得激动。",
    "我没说话。心里有个很冷静的声音告诉我，这时候开口解释只会更糟，沉默至少能让这件事尽快结束，虽然结束的方式我也清楚是什么。他一把扯下搭在椅背上的皮带。",
    "第一下打在肩上。皮带扣磕到骨头，闷响一声，疼痛先于声音抵达。我下意识缩了一下，没有躲。脑子里却荒诞地冒出一句不知道哪里看来的话——“棒打不孝子”，大概此刻在他心里，自己正扮演着一个义正词严的角色吧。我想到这里，几乎要笑，又把那点笑意压回喉咽。",
    "“我白天在外面赚钱，你在家里就干这种事？”他每说一句抽一下。皮带有时候落在空气里，啪的一声，跟肩背上的闷响交替着，“你对得起谁？这个家里除了你自己，你谁都对不起！”",
    "......",
    "等他骂累了摔门出去，我才慢慢坐回椅子上。后背一抽一抽地发烫，我没去揉，只是把摊在桌上的资料重新归位。台灯的光线落在书页上，和刚才一样，没有任何变化。",
    "......",
    "中考前第三天，下午第一节课后是班会。这个时候，学校已经不再授课，并且也不会给学生们功课了。",
    "铃声响过快五分钟，讲台上还是没有人。前排几个同学探头看向走廊，班长清了清嗓子，准备维持纪律。教室里的议论声渐渐放开，有人小声讨论着考前最后这几天该不该再做题，有人翻起了别的科目的卷子，整间教室像是被按了暂停又突然解除限制。",
    "我没有参与这些讨论，只是把手边那张数学卷翻到背面，细想不同类型题的解答方法。",
    "班主任出现的时候，班会已经过去了将近一半。",
    "后门被用力推开，她快步走上讲台，没有了平日里那种规整的节奏。我抬眼看过去，她额前几缕碎发从盘起的发髻里散出来，垂在眼角附近衬衫最上面那颗扣子没扣进对应的扣眼里，歪斜地搭在领口外侧。她在讲台边站定，呼吸还没完全平复。",
    "“今天耽误大家时间了。”她说这句话的时候没有抬头看任何人，径直从教案里抽出一张纸，开始念中考前的注意事项，声音比平时低了一些，咬字也含混了几个字。",
    "班里的议论声没有立刻停下，反倒因为她这反常的状态多绕了几个弯，几个人交换着眼神，像是在用眼神核对彼此猜测的版本。我没有加入这场无声的揣测，只是想，大概是午休睡得太死，被铃声硬生生薅醒，又来不及梳头就往教室跑——这个解释虽然平淡，却比那几个交换的眼神所暗示的任何版本都更说得通。毕竟那间办公室连张能让人躺平的沙发都没有，趴着睡到口水浸湿试卷的事，也总是在这间教室上演。",
    "班会内容很快念完，无非是考场纪律、准考证位置、提前到场时间这些，我一边听，一边把数学卷翻回正面，继续刚才没做完的那道题。",
    "铃声响起，宣布下课，同学们陆陆续续往外走的时候，班主任叫住了我。“子沐辰，你留一下。”教室很快空了大半，几个还在收拾书包的同学也加快了动作离开。我走到讲台边，她已经坐回了自己的位置，手里捏着我这半年的成绩单，纸张边缘被她的指甲蹭出一道浅浅的折痕。",
    "“你的分数，我仔细看了。”她抬头看我，眼神里带着一种我熟悉的、近似宣判前的迟疑，“按现在这个名次，那所学校的线，你很有可能够不上，报名的时候还是按照你父亲的来吧。”",
    "我低头看着自己的鞋尖，没有立刻说话。这是我早就预演过的对话，只是没想到会来得这么直白。“嗯。”我应了一声，肩膀垂下去一点，“我大概也猜到了。”",
    "“是不是有点失望？”她的语气软下来，像是怕我承受不住。",
    "“还行。”我笑了一下，那种笑容我练习过很多次，比真心的失落更轻，又比毫不在意更重，“反正家里大概也不会让我跑那么远，与其去争取，不如老老实实考个就近的，省得到时候白高兴。”我摇了摇头，叹了口气。",
    "她沉默了几秒，手指无意识地抚平那张纸边缘的折痕，没再追问下去。我能看出她没有完全信我这句话，却也找不到立场再继续劝什么。",
    "“考场上的事谁都说不准，争取超常发挥一下，说不定真能拿到那张通知书。”她看着我，稍微笑了笑。",
    "我点了点头，谢过她，转身往外走。走到门口的时候，我在心里把这句话又过了一遍。",
    "超常发挥...吗...",
    "我确实会拿到那张通知书，只是不会是靠超常发挥。",
    "......",
    "中考第一天，天还没亮透，考点门口已经挤满了人。家长们靠在车边打哈欠，手里拎着保温杯和折叠扇，孩子们三三两两站着，互相确认有没有忘记带2B铅笔，有没有把橡皮多备一块。我从公交车上下来，没有人朝我这边张望，也没有人替我背书包，这片喧闹和我之间隔着一段不需要谁去维持的距离。",
    "考点设在另一所中学，校门贴着分考场名单，密密麻麻的名字按准考证号排列。我扫到自己的名字，对应的考场是三楼第二排，同一行还有几个完全没见过的名字，应该是别的学校混进来的。",
    "进考场的时候，我看见一个有些熟悉的身影，我们曾互相眺望，有过一面之缘，那位女生已经坐在前一排靠窗的位置。她没有看我，正低头摆弄笔袋的拉链，拉开又合上，合上又拉开。我走到自己的座位坐下，目光从她背影上收回来，没有停留太久。",
    "监考老师进来后说的第一句话是把准考证和身份证放在桌角，整场考试不能收起来。我把自己那张压在桌角，瞥见她也做了同样的动作，那张纸的边角从我这个位置看过去，只露出小半张。",
    "语文卷子发下来，我没有像平时那样先扫一遍整张卷子估算时间，而是直接从第一题开始往下做，一道接一道，中途没有停顿去想任何与考卷无关的事。监考老师的脚步声偶尔从身后经过，停一下，又继续往前走。这种微小的干扰，对于生活在好似雷雨交加的家庭中的我，简直是白噪音一般令人安心。",
    "后面几天的科目像是被压缩进同一段记忆里——数学、英语、理化、政治历史合卷，每一场之间的间隔只够我啃完一个面包，灌下半瓶水，再被铃声重新拽回到下一张卷子前。监考老师反复重复着同样几句开考须知，语速和语调都没什么差别，我甚至能在他们开口之前，提前在心里把那几句话默完。",
    "英语听力那段，喇叭里的录音放到一半，我已经把要填的空全部填完，剩下的时间只能枯坐着等。教室里没有人说话，只有喇叭里那个机械的女声继续念着下一段对话。我的视线没什么目的地飘了一圈，落在她桌角那张准考证上。",
    "那张纸被她压得很平，名字那一栏正对着我这个角度。",
    "苏馨悦。",
    "我把这三个字在心里念了一遍，没有再多想什么，喇叭里的录音正好播到下一题，我把视线收回试卷上。",
    "最后一场考试结束的铃声响起的时候，监考老师喊了一声“停笔”，整间教室同时响起一片合上笔帽、收拾文具的声音。我把准考证从桌角收进口袋，转身往外走，经过她那一排的时候，她已经站起来，正低头把笔袋拉链拉上，没有看我这边一眼。",
    "我们两个人前后脚走出考场，没有说一句话。我愣在考点门口，看着考生们冲向自己的父母，笑着宣告着这一段战斗的结束。由着这一瞬间内心的冲动，我寻着苏馨悦的背影，她与一位年轻女性混入了校门口攒动的人群里，很快就不见了踪影。",
    "中考就这样...结束了。",
    "......",
    "中考成绩公布那天，学校把分数通过短信发到了备案的手机号上。那个号码是父亲的，从小到大，所有跟我有关的注册信息，用的都是他的号码，仿佛我连一个被通知的资格，都要经过他的手才能拿到。",
    "此时正是为数不多的家庭晚餐时间，他的手机震动了一下。他扒着碗里的饭，低头瞥了一眼屏幕，没太在意，几秒后又重新点开那条短信，这次皱起了眉头。",
    "“这什么学校？”他对着手机自言自语，手指在屏幕上点了两下，把短信又读了一遍。",
    "我没有抬头，继续吃饭，筷子碰到碗沿的声音比平时轻了一些。",
    "“我什么时候报的这个学校？”他抬眼看向我，语气还算平静，只是带着一点没找到答案的烦躁，“这不是我给你填的那几个。”",
    "“可能是学校指标统调了吧。”我说，声音保持在一个听起来合理又不至于引人深究的平淡区间里。",

  /* ═══════════════ DOM 引用 ═══════════════ */
  var viewport  = document.getElementById('viewport');
  var fontLabel = document.getElementById('font-label');
  var pageInfo  = document.getElementById('page-info');

  /* ═══════════════ 状态 ═══════════════ */
  var STORAGE_KEY = 'zimuchen-reading-pos';
  var fontSize    = 16;
  var pages       = [];   // [{start: N, end: N}, ...]
  var currentPage = 0;

  /* ═══════════════ 章节数据 ═══════════════ */
  var chapters = [
    { title: '序章', file: 'index.html', current: true }
    // 后续章节在此添加，例如:
    // { title: '第一章', file: 'zimuchen-ch01.html', current: false }
  ];

  /* ═══════════════ 记忆功能 ═══════════════ */
  function savePos() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        page: currentPage,
        fontSize: fontSize
      }));
    } catch(e) { /* 无痕模式或存储满，静默忽略 */ }
  }

  function loadPos() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var data = JSON.parse(raw);
        if (typeof data.fontSize === 'number' && data.fontSize >= 10 && data.fontSize <= 32) {
          fontSize = data.fontSize;
        }
        if (typeof data.page === 'number' && data.page >= 0) {
          currentPage = data.page;
        }
      }
    } catch(e) { /* 数据损坏，用默认值 */ }
  }

  /* ═══════════════ 工具函数 ═══════════════ */
  function esc(str) {
    var el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  function buildHTML(para) {
    if (para === '序章')   return '<p class="chapter-title">序　章</p>';
    if (para === '序章·完') return '<p class="chapter-end">序章·完</p>';
    if (para === '......') return '<p class="separator">······</p>';
    return '<p>' + esc(para) + '</p>';
  }

  /* ═══════════════ 分页（增量测量） ═══════════════ */
  function paginate() {
    pages = [];

    // 创建测量容器 —— 放在 body 末尾，位置固定但 off-screen
    // 不使用 visibility:hidden，避免某些浏览器不渲染
    var m = document.createElement('div');
    m.className = 'page';
    m.style.position = 'fixed';
    m.style.left = '-9999px';
    m.style.top = '0';
    m.style.zIndex = '-1';

    var mc = document.createElement('div');
    mc.className = 'page-content';
    m.appendChild(mc);
    document.body.appendChild(m);

    // 应用当前字号
    mc.style.fontSize = fontSize + 'px';

    // 计算可用高度：page 总高 - 上下 padding
    var mStyle = window.getComputedStyle(m);
    var maxH = parseFloat(mStyle.height) - parseFloat(mStyle.paddingTop) - parseFloat(mStyle.paddingBottom);

    // 增量构建页面
    var i = 0;
    var total = text.length;

    while (i < total) {
      var pageStart = i;
      // 至少放一个段落
      mc.innerHTML = buildHTML(text[i]);
      i++;

      // 继续加段落直到溢出
      while (i < total) {
        var before = mc.innerHTML;
        mc.innerHTML = before + buildHTML(text[i]);
        if (mc.scrollHeight > maxH + 2) {
          // 溢出，回退
          mc.innerHTML = before;
          break;
        }
        i++;
      }

      pages.push({ start: pageStart, end: i - 1 });
    }

    // 清理
    document.body.removeChild(m);

    // 修正当前页
    if (currentPage >= pages.length) {
      currentPage = Math.max(0, pages.length - 1);
    }
  }

  /* ═══════════════ 渲染当前页 ═══════════════ */
  function render() {
    viewport.innerHTML = '';

    if (pages.length === 0) {
      viewport.innerHTML = '<p style="color:#999;margin-top:40px;">加载中...</p>';
      return;
    }

    var pg = pages[currentPage];

    var pageDiv = document.createElement('div');
    pageDiv.className = 'page';

    var contentDiv = document.createElement('div');
    contentDiv.className = 'page-content';
    contentDiv.style.fontSize = fontSize + 'px';

    var html = '';
    for (var k = pg.start; k <= pg.end; k++) {
      html += buildHTML(text[k]);
    }
    contentDiv.innerHTML = html;

    var pn = document.createElement('div');
    pn.className = 'page-number';
    pn.textContent = '— ' + (currentPage + 1) + ' / ' + pages.length + ' —';

    pageDiv.appendChild(contentDiv);
    pageDiv.appendChild(pn);
    viewport.appendChild(pageDiv);

    window.scrollTo({ top: 0, behavior: 'instant' });

    fontLabel.textContent = fontSize + 'px';
    pageInfo.textContent = '第 ' + (currentPage + 1) + ' / ' + pages.length + ' 页';

    // 末页显示「下一章节」，否则隐藏
    var nextBtn = document.getElementById('btn-next-chapter');
    if (currentPage >= pages.length - 1) {
      nextBtn.style.display = 'inline-flex';
    } else {
      nextBtn.style.display = 'none';
    }

    savePos();
  }

  function repaginate() {
    paginate();
    render();
  }

  /* ═══════════════ 翻页 ═══════════════ */
  function go(n) {
    if (n < 0 || n >= pages.length) return;
    currentPage = n;
    render();
  }
  function next() { if (currentPage < pages.length - 1) { currentPage++; render(); } }
  function prev() { if (currentPage > 0) { currentPage--; render(); } }

  /* ═══════════════ 事件绑定 ═══════════════ */
  document.getElementById('btn-up').addEventListener('click', function() {
    if (fontSize < 32) { fontSize++; repaginate(); }
  });
  document.getElementById('btn-down').addEventListener('click', function() {
    if (fontSize > 10) { fontSize--; repaginate(); }
  });
  document.getElementById('btn-prev').addEventListener('click', prev);
  document.getElementById('btn-next').addEventListener('click', next);
  document.getElementById('btn-restart').addEventListener('click', function() {
    go(0);
  });
  document.getElementById('btn-next-chapter').addEventListener('click', function() {
    // 查找下一个非当前章节
    var found = false;
    for (var ci = 0; ci < chapters.length; ci++) {
      if (chapters[ci].current) continue;
      if (!found) {
        found = true;
        if (chapters[ci].file) {
          window.location.href = chapters[ci].file;
          return;
        }
      }
    }
    // 没有下一章节
    alert('敬请期待下一章节。');
  });

  // 章节选择下拉
  var chapterSelect = document.getElementById('chapter-select');
  function populateChapterSelect() {
    chapterSelect.innerHTML = '';
    for (var ci = 0; ci < chapters.length; ci++) {
      var opt = document.createElement('option');
      opt.value = ci;
      opt.textContent = chapters[ci].title;
      if (chapters[ci].current) opt.selected = true;
      chapterSelect.appendChild(opt);
    }
  }
  populateChapterSelect();
  chapterSelect.addEventListener('change', function() {
    var idx = parseInt(this.value);
    if (isNaN(idx) || idx < 0 || idx >= chapters.length) return;
    var ch = chapters[idx];
    if (ch.current) return; // 已经是当前章节
    if (ch.file) {
      window.location.href = ch.file;
    }
  });

  document.addEventListener('keydown', function(e) {
    var key = e.key;
    if (key === 'ArrowLeft' || key === 'ArrowUp' || key === 'PageUp') {
      e.preventDefault(); prev();
    } else if (key === 'ArrowRight' || key === 'ArrowDown' || key === 'PageDown' || key === ' ') {
      e.preventDefault(); next();
    } else if (key === 'Home') {
      e.preventDefault(); go(0);
    } else if (key === 'End') {
      e.preventDefault(); go(pages.length - 1);
    }
  });

  // 触摸滑动翻页
  var tx = 0, ty = 0;
  document.addEventListener('touchstart', function(e) {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  });
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - tx;
    var dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      dx < 0 ? next() : prev();
    }
  });

  /* ═══════════════ 启动 ═══════════════ */
  loadPos();       // 恢复上次阅读位置
  paginate();      // 用恢复的字号分页
  if (currentPage >= pages.length) {
    currentPage = Math.max(0, pages.length - 1);
  }
  render();
})();
</script>
